<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Occam's Developer</title>
  <meta name="description" content="Occam's Developer — independent app development studio based in Calgary, Alberta. Maker of Bucket Money: Budget Tracker.">
  <style>
    :root {
      --ink: #1c1c1e;
      --muted: #6e6e73;
      --accent: #0a5c36;
      --bg: #fafaf8;
      --card: #ffffff;
      --border: #e6e6e2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    main {
      flex: 1;
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 96px 24px 48px;
    }
    h1 {
      font-size: 2.2rem;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .tagline {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 56px;
    }
    h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .app-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      max-width: 480px;
    }
    .app-card h3 { font-size: 1.15rem; margin-bottom: 4px; }
    .app-card p { color: var(--muted); font-size: 0.95rem; margin-bottom: 14px; }
    .app-links { display: flex; gap: 16px; flex-wrap: wrap; }
    .app-links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .app-links a:hover { text-decoration: underline; }
    footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>Occam&rsquo;s Developer</h1>
    <p class="tagline">Independent app development studio &middot; Calgary, Alberta</p>

    <h2>Apps</h2>
    <div class="app-card">
      <h3>Bucket Money: Budget Tracker</h3>
      <p>A personal budgeting app that organizes your income and expenses into simple funds.</p>
      <div class="app-links">
        <a href="/bucketmoney/privacy">Privacy Policy</a>
      </div>
    </div>
  </main>
  <footer>
    &copy; 2026 Occam&rsquo;s Developer &middot; <a href="mailto:hello@occamsdeveloper.com">hello@occamsdeveloper.com</a>
  </footer>
</body>
</html>
